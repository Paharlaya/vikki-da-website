<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikki Da - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 50px;
            max-width: 600px;
            text-align: center;
            animation: fadeIn 0.8s ease-in;
        }

        h1 {
            color: #764ba2;
            font-size: 2.5em;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .message {
            font-size: 1.3em;
            color: #555;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .signature {
            font-style: italic;
            color: #888;
            font-size: 1.1em;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .dot-animation {
            display: inline-block;
        }

        .dot-animation span {
            animation: blink 1.4s infinite;
            animation-fill-mode: both;
        }

        .dot-animation span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot-animation span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 60%, 100% {
                opacity: 0.2;
            }
            30% {
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }
            h1 {
                font-size: 2em;
            }
            .message {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coming Soon</h1>
        <div class="message">
            Your site is on its way<span class="dot-animation"><span>.</span><span>.</span><span>.</span></span>
            <br><br>
            Stay tuned for something special!
        </div>
        <div class="signature">
            Warm regards,<br>
            Vikki Da
        </div>
    </div>
</body>
</html>
